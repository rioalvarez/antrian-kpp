<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Koneksi Gagal</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ff6b6b;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 15px;
            color: #a0a0a0;
        }
        .url {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 10px 20px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 1.1em;
        }
        .retry-btn {
            background: #4a90d9;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }
        .retry-btn:hover {
            background: #3a7bc8;
        }
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #4a90d9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .status {
            font-size: 0.9em;
            color: #666;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Tidak Dapat Terhubung ke Server</h1>
        <p>Pastikan server antrian sudah berjalan.</p>
        <div class="url" id="serverUrl">Server</div>
        <p>Tekan F5 atau klik tombol di bawah untuk mencoba lagi.</p>
        <div class="spinner" id="spinner"></div>
        <button class="retry-btn" onclick="retry()">Coba Lagi</button>
        <p class="status" id="status">Mencoba menyambung ulang secara otomatis...</p>
    </div>
    <script>
        // Try to get server URL from localStorage or default
        var serverUrl = 'http://localhost:8080';
        var displayPath = '/display';
        try {
            var stored = localStorage.getItem('tauri_server_url');
            if (stored) serverUrl = stored;
            var storedPath = localStorage.getItem('tauri_display_path');
            if (storedPath) displayPath = storedPath;
        } catch(e) {}
        document.getElementById('serverUrl').textContent = serverUrl;

        function retry() {
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('status').textContent = 'Mencoba menyambung...';
            setTimeout(function() {
                window.location.href = serverUrl + displayPath;
            }, 500);
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F5') {
                e.preventDefault();
                retry();
            }
        });

        // Auto retry every 10 seconds
        var retryCount = 0;
        setInterval(function() {
            retryCount++;
            document.getElementById('status').textContent =
                'Percobaan ke-' + retryCount + '... Mencoba menyambung ulang...';
            fetch(serverUrl + '/api/health', { mode: 'no-cors' })
                .then(function(r) {
                    if (r.ok || r.type === 'opaque') {
                        document.getElementById('status').textContent = 'Server ditemukan! Memuat halaman...';
                        document.getElementById('spinner').style.display = 'block';
                        window.location.href = serverUrl + displayPath;
                    }
                })
                .catch(function() {
                    document.getElementById('status').textContent =
                        'Percobaan ke-' + retryCount + ' gagal. Mencoba lagi dalam 10 detik...';
                });
        }, 10000);
    </script>
</body>
</html>
