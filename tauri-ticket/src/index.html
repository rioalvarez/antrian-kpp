<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antrian Tiket</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #fafafa;
            color: #18181b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            padding: 40px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 440px;
        }
        h1 { font-size: 1.5em; margin-bottom: 12px; color: #2563eb; }
        p { font-size: 0.95em; margin-bottom: 12px; color: #71717a; }
        .spinner {
            width: 32px; height: 32px;
            border: 3px solid #e4e4e7;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 16px auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Menghubungkan ke Server...</h1>
        <div class="spinner"></div>
        <p>Pastikan server antrian sudah berjalan.</p>
    </div>
</body>
</html>
